    // Three.js Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.0015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 35;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    // Particles
    const PARTICLE_COUNT = 15000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

    // Initialize
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 100;
        colors[i] = 1.0;
        targetPositions[i] = positions[i];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const getSprite = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255, 215, 180, 1)');
        gradient.addColorStop(0.3, 'rgba(255, 184, 140, 0.8)');
        gradient.addColorStop(0.6, 'rgba(255, 140, 100, 0.3)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        const texture = new THREE.Texture(canvas);
        texture.needsUpdate = true;
        return texture;
    };

    const material = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        map: getSprite(),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // Add ambient stars
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i++) {
        starPositions[i] = (Math.random() - 0.5) * 200;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({
        size: 0.3,
        color: 0xffd7b4,
        transparent: true,
        opacity: 0.4
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Gemstone crystal generation functions
    
    // Helper: Create faceted crystal structure
    function createFacetedCrystal(baseVertices, height, r, g, b, sparkle = true) {
        const points = [];
        const numLayers = 40;
        
        // Create layered facets
        for (let layer = 0; layer < numLayers; layer++) {
            const t = layer / numLayers;
            const scale = 1 - Math.abs(t - 0.5) * 1.6; // Diamond shape
            
            baseVertices.forEach((vertex, i) => {
                const nextVertex = baseVertices[(i + 1) % baseVertices.length];
                const steps = 30;
                
                for (let s = 0; s < steps; s++) {
                    const edgeT = s / steps;
                    const x = (vertex.x + (nextVertex.x - vertex.x) * edgeT) * scale;
                    const z = (vertex.z + (nextVertex.z - vertex.z) * edgeT) * scale;
                    const y = (t - 0.5) * height;
                    
                    // Add sparkle variation
                    const brightness = sparkle ? (0.7 + Math.random() * 0.3) : 1.0;
                    
                    points.push({
                        x: x + (Math.random() - 0.5) * 0.3,
                        y: y + (Math.random() - 0.5) * 0.3,
                        z: z + (Math.random() - 0.5) * 0.3,
                        r: r * brightness,
                        g: g * brightness,
                        b: b * brightness
                    });
                }
            });
        }
        
        return points;
    }

    function getPointOnMoonstone(i) {
        // Pale, pearlescent sphere with subtle glow
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 8 + Math.sin(theta * 5) * 0.5;
        
        const brightness = 0.9 + Math.random() * 0.1;
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: 0.95 * brightness,
            g: 0.92 * brightness,
            b: 0.98 * brightness
        };
    }

    function getPointOnStarSapphire(i) {
        // Deep blue hexagonal crystal with star pattern
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 6, z: Math.sin(angle) * 6 });
        }
        
        const points = createFacetedCrystal(hexVertices, 14, 0.2, 0.3, 0.85, true);
        return points[i % points.length];
    }

    function getPointOnAquamarine(i) {
        // Pale blue-green hexagonal crystal
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 5, z: Math.sin(angle) * 5 });
        }
        
        const points = createFacetedCrystal(hexVertices, 16, 0.5, 0.85, 0.88, true);
        return points[i % points.length];
    }

    function getPointOnOnyx(i) {
        // Dark, smooth oval with subtle bands
        const angle = (i / PARTICLE_COUNT) * Math.PI * 2 * 8;
        const height = ((i / PARTICLE_COUNT) - 0.5) * 15;
        const radius = 6 * (1 - Math.abs(height / 15) * 0.5);
        
        const bandBrightness = 0.15 + Math.abs(Math.sin(height * 0.5)) * 0.1;
        return {
            x: radius * Math.cos(angle),
            y: height,
            z: radius * Math.sin(angle),
            r: bandBrightness,
            g: bandBrightness,
            b: bandBrightness
        };
    }

    function getPointOnAmber(i) {
        // Warm golden-orange organic shape
        const t = i / PARTICLE_COUNT;
        const phi = Math.acos(-1 + 2 * t);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 7 + Math.sin(theta * 3) * 1.5;
        
        const warmth = 0.85 + Math.random() * 0.15;
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: 1.0 * warmth,
            g: 0.7 * warmth,
            b: 0.2 * warmth
        };
    }

    function getPointOnRoseQuartz(i) {
        // Soft pink hexagonal crystal cluster
        const clusterCount = 5;
        const cluster = Math.floor(i / (PARTICLE_COUNT / clusterCount));
        const localI = i % (PARTICLE_COUNT / clusterCount);
        
        const clusterAngle = (cluster / clusterCount) * Math.PI * 2;
        const offsetX = Math.cos(clusterAngle) * 3;
        const offsetZ = Math.sin(clusterAngle) * 3;
        
        const t = localI / (PARTICLE_COUNT / clusterCount);
        const y = (t - 0.5) * 10;
        const radius = 3 * (1 - Math.abs(t - 0.5) * 1.5);
        const angle = t * Math.PI * 2 * 6;
        
        const softness = 0.9 + Math.random() * 0.1;
        return {
            x: offsetX + radius * Math.cos(angle),
            y: y,
            z: offsetZ + radius * Math.sin(angle),
            r: 1.0 * softness,
            g: 0.75 * softness,
            b: 0.80 * softness
        };
    }

    function getPointOnAmethyst(i) {
        // Purple hexagonal crystal points
        const pointCount = 7;
        const point = Math.floor(i / (PARTICLE_COUNT / pointCount));
        const localI = i % (PARTICLE_COUNT / pointCount);
        
        const baseAngle = (point / pointCount) * Math.PI * 2;
        const baseRadius = point === 0 ? 0 : 6;
        const baseX = Math.cos(baseAngle) * baseRadius;
        const baseZ = Math.sin(baseAngle) * baseRadius;
        
        const t = localI / (PARTICLE_COUNT / pointCount);
        const y = t * 12 - 6;
        const radius = (1 - t) * 2.5;
        const angle = t * Math.PI * 2 * 6;
        
        const depth = 0.7 + Math.random() * 0.3;
        return {
            x: baseX + radius * Math.cos(angle),
            y: y,
            z: baseZ + radius * Math.sin(angle),
            r: 0.6 * depth,
            g: 0.3 * depth,
            b: 0.9 * depth
        };
    }

    function getPointOnOpal(i) {
        // Iridescent sphere with color shifting
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 7;
        
        const colorShift = Math.sin(theta * 3 + phi * 2);
        const r_val = 0.9 + colorShift * 0.1;
        const g_val = 0.7 + Math.cos(theta * 2) * 0.3;
        const b_val = 0.8 + Math.sin(phi * 3) * 0.2;
        
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: r_val,
            g: g_val,
            b: b_val
        };
    }

    function getPointOnCitrine(i) {
        // Warm yellow-orange hexagonal crystal
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 5.5, z: Math.sin(angle) * 5.5 });
        }
        
        const points = createFacetedCrystal(hexVertices, 15, 1.0, 0.85, 0.3, true);
        return points[i % points.length];
    }

    function getPointOnRuby(i) {
        // Deep red hexagonal crystal with brilliant facets
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 4.5, z: Math.sin(angle) * 4.5 });
        }
        
        const points = createFacetedCrystal(hexVertices, 13, 0.9, 0.15, 0.2, true);
        return points[i % points.length];
    }

    function getPointOnEmerald(i) {
        // Rich green hexagonal crystal
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 5, z: Math.sin(angle) * 5 });
        }
        
        const points = createFacetedCrystal(hexVertices, 16, 0.2, 0.85, 0.4, true);
        return points[i % points.length];
    }

    function getPointOnPeridot(i) {
        // Lime-green olive crystal
        const octVertices = [];
        for (let j = 0; j < 8; j++) {
            const angle = (j / 8) * Math.PI * 2;
            octVertices.push({ x: Math.cos(angle) * 6, z: Math.sin(angle) * 6 });
        }
        
        const points = createFacetedCrystal(octVertices, 14, 0.6, 0.9, 0.3, true);
        return points[i % points.length];
    }

    function getPointOnDiamond(i) {
        // Brilliant cut diamond with maximum sparkle
        const octVertices = [];
        for (let j = 0; j < 8; j++) {
            const angle = (j / 8) * Math.PI * 2;
            octVertices.push({ x: Math.cos(angle) * 4, z: Math.sin(angle) * 4 });
        }
        
        const t = (i % 1000) / 1000;
        const layer = Math.floor(i / 1000);
        const scale = 1 - Math.abs(t - 0.5) * 1.8;
        const vertexIndex = Math.floor(t * 8);
        const nextIndex = (vertexIndex + 1) % 8;
        const edgeT = (t * 8) % 1;
        
        const v1 = octVertices[vertexIndex];
        const v2 = octVertices[nextIndex];
        
        const x = (v1.x + (v2.x - v1.x) * edgeT) * scale;
        const z = (v1.z + (v2.z - v1.z) * edgeT) * scale;
        const y = (t - 0.5) * 12;
        
        // Maximum brilliance and sparkle
        const brilliance = 0.85 + Math.random() * 0.15;
        const rainbow = Math.sin(i * 0.01) * 0.05;
        
        return {
            x: x + (Math.random() - 0.5) * 0.2,
            y: y + (Math.random() - 0.5) * 0.2,
            z: z + (Math.random() - 0.5) * 0.2,
            r: brilliance + rainbow,
            g: brilliance,
            b: brilliance + rainbow * 0.5
        };
    }

    function getPointOnClearQuartz(i) {
        // Clear hexagonal crystal with perfect clarity
        const hexVertices = [];
        for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            hexVertices.push({ x: Math.cos(angle) * 6, z: Math.sin(angle) * 6 });
        }
        
        const points = createFacetedCrystal(hexVertices, 18, 0.98, 0.98, 1.0, true);
        return points[i % points.length];
    }

    function getPointOnLapisLazuli(i) {
        // Deep blue with gold flecks
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 8;
        
        // Mostly deep blue, occasional gold fleck
        const isGoldFleck = Math.random() > 0.92;
        
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: isGoldFleck ? 0.9 : 0.15,
            g: isGoldFleck ? 0.7 : 0.25,
            b: isGoldFleck ? 0.3 : 0.75
        };
    }

    function getPointOnLabradorite(i) {
        // Gray with iridescent blue/green/gold flashes
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 7.5;
        
        const flashAngle = Math.sin(theta * 5 + phi * 3);
        const showFlash = flashAngle > 0.7;
        
        let r_val, g_val, b_val;
        if (showFlash) {
            // Iridescent flash
            const hue = Math.sin(theta * 2);
            if (hue > 0.5) {
                r_val = 0.3; g_val = 0.5; b_val = 0.9; // Blue flash
            } else if (hue > 0) {
                r_val = 0.3; g_val = 0.8; b_val = 0.6; // Green flash
            } else {
                r_val = 0.9; g_val = 0.7; b_val = 0.3; // Gold flash
            }
        } else {
            // Base gray
            const gray = 0.35 + Math.random() * 0.1;
            r_val = gray; g_val = gray; b_val = gray * 1.1;
        }
        
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: r_val,
            g: g_val,
            b: b_val
        };
    }

    function getPointOnAventurine(i) {
        // Green with sparkly inclusions
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 7;
        
        const hasSparkle = Math.random() > 0.85;
        const brightness = hasSparkle ? 1.2 : 0.9;
        
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: 0.3 * brightness,
            g: 0.75 * brightness,
            b: 0.4 * brightness
        };
    }

    function getPointOnAlexandrite(i) {
        // Color-change: blue-green to purple-red
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 8;
        
        // Create color change effect based on position
        const changeT = (Math.sin(theta * 2) + 1) / 2;
        
        const r_val = 0.5 + changeT * 0.5;  // Shifts from teal to red
        const g_val = 0.6 - changeT * 0.3;  // Shifts from green to purple
        const b_val = 0.7 + changeT * 0.2;  // Keeps blue-purple
        
        const sparkle = 0.9 + Math.random() * 0.1;
        
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: r_val * sparkle,
            g: g_val * sparkle,
            b: b_val * sparkle
        };
    }

    function setTargetShape(shapeName) {
        const colorAttr = particles.geometry.attributes.color;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let p;
            switch(shapeName) {
                case 'moonstone': p = getPointOnMoonstone(i); break;
                case 'star_sapphire': p = getPointOnStarSapphire(i); break;
                case 'aquamarine': p = getPointOnAquamarine(i); break;
                case 'onyx': p = getPointOnOnyx(i); break;
                case 'amber': p = getPointOnAmber(i); break;
                case 'rose_quartz': p = getPointOnRoseQuartz(i); break;
                case 'amethyst': p = getPointOnAmethyst(i); break;
                case 'opal': p = getPointOnOpal(i); break;
                case 'citrine': p = getPointOnCitrine(i); break;
                case 'ruby': p = getPointOnRuby(i); break;
                case 'emerald': p = getPointOnEmerald(i); break;
                case 'peridot': p = getPointOnPeridot(i); break;
                case 'diamond': p = getPointOnDiamond(i); break;
                case 'clear_quartz': p = getPointOnClearQuartz(i); break;
                case 'lapis_lazuli': p = getPointOnLapisLazuli(i); break;
                case 'labradorite': p = getPointOnLabradorite(i); break;
                case 'aventurine': p = getPointOnAventurine(i); break;
                case 'alexandrite': p = getPointOnAlexandrite(i); break;
                default: p = getPointOnMoonstone(i);
            }

            targetPositions[i * 3] = p.x;
            targetPositions[i * 3 + 1] = p.y;
            targetPositions[i * 3 + 2] = p.z;
            colorAttr.setXYZ(i, p.r, p.g, p.b);
        }
        colorAttr.needsUpdate = true;
    }

    // State
    let currentStanza = 0;
    let handX = 0, handY = 0, handZ = 0;
    let isPinching = false, isFist = false;
    let lastSwipeTime = 0;
    let lastHandX = 0;
    let isPaused = false;

    // UI Elements
    const poemContainer = document.getElementById('poem-container');
    const shapeInfo = document.getElementById('shape-info');
    const shapeTitle = document.getElementById('shape-title');
    const shapeMeaning = document.getElementById('shape-meaning');
    const gemstoneProperties = document.getElementById('gemstone-properties');
    const progress = document.getElementById('progress');
    const controlsHint = document.getElementById('controls-hint');

    function displayStanza(index) {
        if (index < 0 || index >= poemData.length) return;
        
        currentStanza = index;
        const data = poemData[index];
        
        // Update poem with fade transition
        poemContainer.style.opacity = '0';
        setTimeout(() => {
            poemContainer.innerHTML = '';
            data.lines.forEach((line, i) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'stanza-line';
                lineDiv.textContent = line;
                lineDiv.style.animationDelay = `${i * 0.15}s`;
                poemContainer.appendChild(lineDiv);
            });
            poemContainer.style.opacity = '1';
        }, 400);
        
        // Update shape
        setTargetShape(data.shape);
        
        // Update info
        shapeTitle.textContent = data.title;
        shapeMeaning.textContent = data.meaning;
        gemstoneProperties.textContent = data.properties;
        
        // Update progress
        progress.textContent = `${index + 1} / ${poemData.length}`;
    }

    // Hand tracking
    const videoElement = document.getElementsByClassName('input_video')[0];
    
    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            // Get hand position
            const newHandX = (0.5 - landmarks[9].x) * 2;
            handY = (0.5 - landmarks[9].y) * 2;
            handZ = landmarks[9].z;
            
            // Detect swipe
            const swipeDelta = newHandX - lastHandX;
            if (Math.abs(swipeDelta) > 0.15 && Date.now() - lastSwipeTime > 800) {
                if (swipeDelta > 0 && currentStanza > 0) {
                    displayStanza(currentStanza - 1);
                    lastSwipeTime = Date.now();
                } else if (swipeDelta < 0 && currentStanza < poemData.length - 1) {
                    displayStanza(currentStanza + 1);
                    lastSwipeTime = Date.now();
                }
            }
            lastHandX = newHandX;
            handX = newHandX;
            
            // Detect pinch
            const dist = Math.hypot(
                landmarks[8].x - landmarks[4].x,
                landmarks[8].y - landmarks[4].y,
                landmarks[8].z - landmarks[4].z
            );
            isPinching = dist < 0.05;
            
            // Detect fist
            const palmDist = Math.hypot(
                landmarks[8].x - landmarks[0].x,
                landmarks[8].y - landmarks[0].y
            );
            isFist = palmDist < 0.25;
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({ image: videoElement });
        },
        width: 320,
        height: 240
    });

    // Initialize immediately
    displayStanza(0);
    cameraUtils.start();

    // Animation loop
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        
        const time = clock.getElapsedTime();
        const posAttr = particles.geometry.attributes.position;
        const curPos = posAttr.array;

        // Smooth rotation based on hand
        particles.rotation.x += ((handY * 0.5) - particles.rotation.x) * 0.08;
        particles.rotation.y += ((handX * 0.5) - particles.rotation.y) * 0.08;
        particles.rotation.z += 0.0005;

        // Expansion based on hand height and fist
        let exp = 1.0;
        if (isFist) {
            exp = 0.3;
        } else if (isPinching) {
            exp = 1.5;
        } else {
            exp = 1.0 + (1 - Math.abs(handY)) * 0.3;
        }

        // Update particles
        const speed = isPinching ? 0.02 : (isFist ? 0.15 : 0.04);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const idx = i * 3;
            const tx = targetPositions[idx] * exp;
            const ty = targetPositions[idx + 1] * exp;
            const tz = targetPositions[idx + 2] * exp;
            const noise = Math.sin(time * 0.5 + i * 0.01) * 0.03;

            curPos[idx] += (tx - curPos[idx]) * speed + noise;
            curPos[idx + 1] += (ty - curPos[idx + 1]) * speed + noise;
            curPos[idx + 2] += (tz - curPos[idx + 2]) * speed + noise;
        }
        posAttr.needsUpdate = true;

        // Rotate stars slowly
        stars.rotation.y += 0.0001;

        renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize first shape
    setTargetShape('moonstone');
    animate();
</script>
</body>
</html>

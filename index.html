<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Day That Is Hers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(10, 15, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; 
            background: #050508; 
            font-family: 'Caveat', cursive; 
            overflow: hidden; 
            color: var(--text-primary);
            user-select: none;
        }

        #video-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Camera feed: mirrored and dimmed heavily to keep focus on particles */
        video { display: none; }
        #camera_canvas {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.15; /* Subtle background presence */
            z-index: 1;
        }

        #particle_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .instruction { 
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            transition: opacity 1s ease;
        }

        #poem-card { 
            background: var(--glass-bg); 
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
            max-width: 90vw;
            width: 550px;
            text-align: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            opacity: 0; /* Hidden initially */
            transform: translateY(20px);
            pointer-events: none;
        }

        #poem-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stanza {
            font-size: 2rem; 
            line-height: 1.4;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            white-space: pre-line; 
        }

        .hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #loading {
            position: absolute;
            z-index: 20;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 2px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="camera_canvas"></canvas>
    <canvas id="particle_canvas"></canvas>
    
    <div id="loading">WAKING UP THE CAMERA...</div>

    <div id="ui-layer">
        <div id="hug-prompt" class="instruction" style="display:none;">Bring both hands together to begin...</div>
        
        <div id="poem-card">
            <div id="poem-text" class="stanza"></div>
        </div>

        <div id="controls-hint" class="hint">Swipe hand left/right to continue • Make a Heart 🫶 for magic</div>
    </div>
</div>

<script>
    // --- 1. Data State ---
    const stanzas = [
        "Some people arrive into a day\nand nothing really changes shape,\nThe hours pass the way they do,\nthe sky remains the same escape.",
        "But then there are days like this—\nthe kind that feel a little more aware,\nAs if the world remembers softly\nthat someone like her is here.",
        "Not in a way that asks for noise,\nor celebration loud and bright,\nBut in the way small things align\na little better in her light.",
        "She doesn’t try to be remarkable,\ndoesn’t gather attention or claim,\nYet somehow everything around her\nfeels steadier just the same.",
        "The way she carries every moment,\nas if time trusts her with its weight,\nNot rushing through, not falling behind,\njust meeting each piece at its state.",
        "There’s something rare in how she moves,\nlike calm stitched carefully with grace,\nLike even the busiest days she holds\ncan’t quite disturb her inner pace.",
        "And still, within all of that strength,\nthere’s softness she never misplaces—\nIn the way she listens, understands,\nin the way she reads unspoken spaces.",
        "She notices things most overlook,\nthe little shifts, the hidden hue,\nThe quiet beauty in passing skies,\nthe kind of things that stay with you.",
        "Maybe that’s why the world feels different\nwhen she looks at it for a while—\nBecause even a sunset seems to learn\nhow to deepen just to match her style.",
        "And somewhere in all of this,\nsomeone stands a little to the side,\nNot trying to hold or change her course,\njust watching with a kind of quiet pride.",
        "Seeing how she’s become all this\nwithout needing help or a name,\nBuilding herself piece by piece\ninto something steady and untamed.",
        "There’s admiration that doesn’t speak much,\nthat doesn’t need to be explained,\nJust a quiet kind of awe that grows\nevery time her presence remains.",
        "And maybe that’s what makes today\nfeel different in its own calm way—\nNot because the world has changed,\nbut because it’s her day.",
        "A day that doesn’t need grand words,\nor promises stretched too far ahead,\nJust the simple truth that who she is\nhas already shaped so much instead.",
        "So here’s to the way she keeps growing—\nnot louder, not faster, just true,\nLike a sky that keeps finding new colors\nand never forgets its blue.",
        "Here’s to everything she’s carried,\neverything she’s yet to be,\nTo the quiet strength, the gentle care,\nto the person she’s already become so naturally.",
        "And if days keep moving forward like this,\nwith all that she holds and creates,\nThen the world’s only getting better\nwith every step she takes.",
        "Because some people don’t just pass through life—\nthey change how it’s seen, how it’s felt, how it stays…\n\n…and today just happens to be hers. 💜"
    ];

    const colorPalettes = [
        {r: 100, g: 150, b: 255}, {r: 120, g: 180, b: 255}, {r: 140, g: 160, b: 255},
        {r: 160, g: 140, b: 255}, {r: 180, g: 120, b: 240}, {r: 200, g: 100, b: 220},
        {r: 220, g: 90,  b: 180}, {r: 240, g: 100, b: 140}, {r: 255, g: 120, b: 100},
        {r: 255, g: 150, b: 80},  {r: 255, g: 180, b: 60},  {r: 255, g: 200, b: 80},
        {r: 255, g: 220, b: 100}, {r: 255, g: 180, b: 150}, {r: 220, g: 140, b: 200},
        {r: 180, g: 120, b: 240}, {r: 150, g: 100, b: 255}, {r: 180, g: 130, b: 255} 
    ];

    let currentIndex = 0;
    let isRevealed = false;
    let isTransitioning = false;
    
    // Gesture Tracking State
    let lastHandX = null;
    let lastSwipeTime = 0;

    // --- 2. Setup 3D Particles ---
    const canvas = document.getElementById('particle_canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    const particles = [];
    const extraMagicParticles = []; // For the heart gesture
    const numParticles = 800; // Optimized for running alongside MediaPipe
    
    let rotationX = 0, rotationY = 0;
    let targetShape = 'sphere'; 
    let currentGlobalColor = colorPalettes[0];

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    function initParticles() {
        for (let i = 0; i < numParticles; i++) {
            // Sphere (Fibonacci)
            const phi = Math.acos(-1 + (2 * i) / numParticles);
            const theta = Math.sqrt(numParticles * Math.PI) * phi;
            const r = width < 600 ? 120 : 200; 
            const sx = r * Math.cos(theta) * Math.sin(phi);
            const sy = r * Math.sin(theta) * Math.sin(phi);
            const sz = r * Math.cos(phi);

            // Heart (3D Parametric)
            const t = Math.random() * Math.PI * 2;
            const hx2D = 16 * Math.pow(Math.sin(t), 3);
            const hy2D = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            const angle = (Math.random() - 0.5) * Math.PI; 
            const scale = width < 600 ? 6 : 9; 
            const hx = (hx2D * scale) * Math.cos(angle);
            const hz = (hx2D * scale) * Math.sin(angle);
            const hy = hy2D * scale;

            particles.push({
                x: sx, y: sy, z: sz, 
                targetX: sx, targetY: sy, targetZ: sz,
                sphere: {x: sx, y: sy, z: sz},
                heart: {x: hx, y: hy, z: hz},
                color: {r: currentGlobalColor.r, g: currentGlobalColor.g, b: currentGlobalColor.b},
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.05 + 0.02
            });
        }
    }

    // --- 3. Animation Loop ---
    function animate() {
        ctx.clearRect(0, 0, width, height);

        // Auto-rotate
        rotationY += 0.005; rotationX += 0.002;
        const centerX = width / 2; const centerY = height / 2;

        if(isRevealed) {
            particles.forEach(p => {
                // Determine target
                if (targetShape === 'heart') {
                    p.targetX = p.heart.x; p.targetY = p.heart.y; p.targetZ = p.heart.z;
                } else {
                    p.targetX = p.sphere.x; p.targetY = p.sphere.y; p.targetZ = p.sphere.z;
                }

                // Morph interpolation
                p.x += (p.targetX - p.x) * p.speed;
                p.y += (p.targetY - p.y) * p.speed;
                p.z += (p.targetZ - p.z) * p.speed;

                // Color interpolation
                p.color.r += (currentGlobalColor.r - p.color.r) * 0.05;
                p.color.g += (currentGlobalColor.g - p.color.g) * 0.05;
                p.color.b += (currentGlobalColor.b - p.color.b) * 0.05;

                // 3D Math
                let cosX = Math.cos(rotationX), sinX = Math.sin(rotationX);
                let cosY = Math.cos(rotationY), sinY = Math.sin(rotationY);
                let x1 = p.x * cosY - p.z * sinY; let z1 = p.z * cosY + p.x * sinY;
                let y1 = p.y * cosX - z1 * sinX;  let z2 = z1 * cosX + p.y * sinX;

                const perspective = 600 / (600 + z2);
                const drawX = centerX + x1 * perspective;
                const drawY = centerY + y1 * perspective;
                const drawSize = Math.max(0.1, p.size * perspective);

                let finalSize = drawSize;
                if (targetShape === 'heart') finalSize *= (Math.sin(Date.now() * 0.005) * 0.3 + 1);

                ctx.beginPath();
                ctx.arc(drawX, drawY, finalSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${Math.floor(p.color.r)}, ${Math.floor(p.color.g)}, ${Math.floor(p.color.b)})`;
                ctx.fill();
            });
        }

        // Handle Extra Magic Particles (from Heart gesture)
        for (let i = extraMagicParticles.length - 1; i >= 0; i--) {
            let mp = extraMagicParticles[i];
            mp.x += mp.vx; mp.y += mp.vy;
            mp.opacity -= 0.02;
            
            ctx.beginPath();
            ctx.arc(mp.x, mp.y, mp.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 200, 255, ${mp.opacity})`;
            ctx.shadowBlur = 10; ctx.shadowColor = 'white';
            ctx.fill();
            ctx.shadowBlur = 0; // reset

            if (mp.opacity <= 0) extraMagicParticles.splice(i, 1);
        }

        requestAnimationFrame(animate);
    }

    // --- 4. Logic & Gestures ---
    const poemText = document.getElementById('poem-text');
    const poemCard = document.getElementById('poem-card');
    const promptText = document.getElementById('hug-prompt');
    const controlsHint = document.getElementById('controls-hint');

    function advance() {
        if (isTransitioning || currentIndex >= stanzas.length - 1) return;
        isTransitioning = true;
        poemCard.style.opacity = '0';

        setTimeout(() => {
            currentIndex++;
            poemText.innerText = stanzas[currentIndex];
            currentGlobalColor = colorPalettes[currentIndex % colorPalettes.length];

            // Morph half way
            if (currentIndex >= Math.floor(stanzas.length / 2)) targetShape = 'heart';

            poemCard.style.opacity = '1';
            isTransitioning = false;
        }, 800);
    }

    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // --- 5. MediaPipe Integration ---
    const videoElement = document.getElementById('input_video');
    const camCanvas = document.getElementById('camera_canvas');
    const camCtx = camCanvas.getContext('2d');
    const loadingText = document.getElementById('loading');

    function onResults(results) {
        if(loadingText.style.display !== 'none') {
            loadingText.style.display = 'none';
            promptText.style.display = 'block'; // Show instructions once ready
        }

        camCanvas.width = videoElement.videoWidth; camCanvas.height = videoElement.videoHeight;
        camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);

        // Draw camera feed slightly
        camCtx.drawImage(results.image, 0, 0, camCanvas.width, camCanvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            
            // Draw landmarks for feedback
            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(camCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.2)', lineWidth: 1});
                drawLandmarks(camCtx, landmarks, {color: 'rgba(255,255,255,0.5)', radius: 1});
            }

            // Two-hand gestures
            if (results.multiHandLandmarks.length >= 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                // 1. THE HUG: To reveal the poem initially
                const hugDist = getDistance(hand1[0], hand2[0]);
                if (hugDist < 0.3 && !isRevealed) {
                    isRevealed = true;
                    promptText.style.display = 'none';
                    poemText.innerText = stanzas[0];
                    poemCard.classList.add('visible');
                    setTimeout(() => controlsHint.style.opacity = '1', 3000);
                }

                // 2. THE HEART: Extra Magic
                const indexDist = getDistance(hand1[8], hand2[8]);
                const thumbDist = getDistance(hand1[4], hand2[4]);
                if (indexDist < 0.08 && thumbDist < 0.08 && isRevealed) {
                    // Spawn magic particles from center of screen
                    for(let i=0; i<5; i++) {
                        extraMagicParticles.push({
                            x: width/2 + (Math.random()-0.5)*50,
                            y: height/2 + (Math.random()-0.5)*50,
                            vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
                            size: Math.random()*3 + 1, opacity: 1
                        });
                    }
                }
            }

            // One-hand gestures (SWIPE to advance)
            if (isRevealed) {
                const wristX = results.multiHandLandmarks[0][0].x; // Normalized X
                const now = Date.now();
                
                if (lastHandX !== null) {
                    let deltaX = wristX - lastHandX;
                    // If hand moves rapidly horizontally and 2 seconds have passed since last swipe
                    if (Math.abs(deltaX) > 0.08 && (now - lastSwipeTime) > 2000) {
                        advance();
                        lastSwipeTime = now;
                    }
                }
                lastHandX = wristX;
            }

        } else {
            lastHandX = null; // Reset swipe tracker if hands leave screen
        }
    }

    // Fallback click listener just in case camera tracking is hard in low light
    document.addEventListener('click', () => { if(isRevealed) advance(); });

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    
    initParticles();
    animate();
    camera.start();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Day That Is Hers</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(15, 20, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; 
            background: #0a0b12; /* Deep space background */
            font-family: 'Caveat', cursive; /* Handwritten font applied */
            overflow: hidden; 
            color: var(--text-primary);
            user-select: none;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks pass through to the document listener */
        }

        #poem-card { 
            background: var(--glass-bg); 
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); 
            max-width: 90vw;
            width: 500px;
            text-align: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            opacity: 1;
            transform: translateY(0);
        }

        #poem-card.hidden {
            opacity: 0;
            transform: translateY(15px);
        }

        .stanza {
            font-size: 1.8rem; /* Adjusted for the handwritten font */
            line-height: 1.5;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            white-space: pre-line; /* Respects line breaks in the JS array */
        }

        .hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div id="ui-layer">
        <div id="poem-card">
            <div id="poem-text" class="stanza"></div>
        </div>
        <div class="hint">Tap or Swipe to continue 🤍</div>
    </div>

<script>
    // --- 1. Poem Data & Colors ---
    const stanzas = [
        "Some people arrive into a day\nand nothing really changes shape,\nThe hours pass the way they do,\nthe sky remains the same escape.",
        "But then there are days like this—\nthe kind that feel a little more aware,\nAs if the world remembers softly\nthat someone like her is here.",
        "Not in a way that asks for noise,\nor celebration loud and bright,\nBut in the way small things align\na little better in her light.",
        "She doesn’t try to be remarkable,\ndoesn’t gather attention or claim,\nYet somehow everything around her\nfeels steadier just the same.",
        "The way she carries every moment,\nas if time trusts her with its weight,\nNot rushing through, not falling behind,\njust meeting each piece at its state.",
        "There’s something rare in how she moves,\nlike calm stitched carefully with grace,\nLike even the busiest days she holds\ncan’t quite disturb her inner pace.",
        "And still, within all of that strength,\nthere’s softness she never misplaces—\nIn the way she listens, understands,\nin the way she reads unspoken spaces.",
        "She notices things most overlook,\nthe little shifts, the hidden hue,\nThe quiet beauty in passing skies,\nthe kind of things that stay with you.",
        "Maybe that’s why the world feels different\nwhen she looks at it for a while—\nBecause even a sunset seems to learn\nhow to deepen just to match her style.",
        "And somewhere in all of this,\nsomeone stands a little to the side,\nNot trying to hold or change her course,\njust watching with a kind of quiet pride.",
        "Seeing how she’s become all this\nwithout needing help or a name,\nBuilding herself piece by piece\ninto something steady and untamed.",
        "There’s admiration that doesn’t speak much,\nthat doesn’t need to be explained,\nJust a quiet kind of awe that grows\nevery time her presence remains.",
        "And maybe that’s what makes today\nfeel different in its own calm way—\nNot because the world has changed,\nbut because it’s her day.",
        "A day that doesn’t need grand words,\nor promises stretched too far ahead,\nJust the simple truth that who she is\nhas already shaped so much instead.",
        "So here’s to the way she keeps growing—\nnot louder, not faster, just true,\nLike a sky that keeps finding new colors\nand never forgets its blue.",
        "Here’s to everything she’s carried,\neverything she’s yet to be,\nTo the quiet strength, the gentle care,\nto the person she’s already become so naturally.",
        "And if days keep moving forward like this,\nwith all that she holds and creates,\nThen the world’s only getting better\nwith every step she takes.",
        "Because some people don’t just pass through life—\nthey change how it’s seen, how it’s felt, how it stays…\n\n…and today just happens to be hers. 💜"
    ];

    // Colors matching the "finding new colors" theme (R, G, B)
    // Progresses from cool night blues/purples into warm sunset pinks/golds
    const colorPalettes = [
        {r: 100, g: 150, b: 255}, // Blue
        {r: 120, g: 180, b: 255}, // Light Blue
        {r: 140, g: 160, b: 255}, // Periwinkle
        {r: 160, g: 140, b: 255}, // Soft Purple
        {r: 180, g: 120, b: 240}, // Purple
        {r: 200, g: 100, b: 220}, // Magenta
        {r: 220, g: 90,  b: 180}, // Pink
        {r: 240, g: 100, b: 140}, // Rose
        {r: 255, g: 120, b: 100}, // Coral
        {r: 255, g: 150, b: 80},  // Peach
        {r: 255, g: 180, b: 60},  // Gold
        {r: 255, g: 200, b: 80},  // Warm Gold
        {r: 255, g: 220, b: 100}, // Soft Yellow
        {r: 255, g: 180, b: 150}, // Sunset Blush
        {r: 220, g: 140, b: 200}, // Twilight Pink
        {r: 180, g: 120, b: 240}, // Deep Twilight
        {r: 150, g: 100, b: 255}, // Night Purple
        {r: 180, g: 130, b: 255}  // Final Bright Purple
    ];

    let currentIndex = 0;
    let isTransitioning = false;

    // --- 2. Canvas & Particle System Setup ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    const particles = [];
    const numParticles = 1500;
    
    // Global transform state
    let rotationX = 0;
    let rotationY = 0;
    let targetShape = 'sphere'; // 'sphere' or 'heart'
    let currentGlobalColor = colorPalettes[0];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Generate coordinates for both shapes for every particle
    function initParticles() {
        for (let i = 0; i < numParticles; i++) {
            // --- Sphere Coordinates (Fibonacci Sphere for even distribution) ---
            const phi = Math.acos(-1 + (2 * i) / numParticles);
            const theta = Math.sqrt(numParticles * Math.PI) * phi;
            const r = width < 600 ? 120 : 200; // Smaller on mobile
            
            const sx = r * Math.cos(theta) * Math.sin(phi);
            const sy = r * Math.sin(theta) * Math.sin(phi);
            const sz = r * Math.cos(phi);

            // --- Heart Coordinates (3D Parametric) ---
            const t = Math.random() * Math.PI * 2;
            const hx2D = 16 * Math.pow(Math.sin(t), 3);
            const hy2D = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            // Extrude into a 3D volume
            const angle = (Math.random() - 0.5) * Math.PI; 
            const scale = width < 600 ? 5 : 8; // Smaller on mobile
            const hx = (hx2D * scale) * Math.cos(angle);
            const hz = (hx2D * scale) * Math.sin(angle);
            const hy = hy2D * scale;

            particles.push({
                x: sx, y: sy, z: sz, // Current positions start at sphere
                targetX: sx, targetY: sy, targetZ: sz,
                sphere: {x: sx, y: sy, z: sz},
                heart: {x: hx, y: hy, z: hz},
                color: {r: currentGlobalColor.r, g: currentGlobalColor.g, b: currentGlobalColor.b},
                size: Math.random() * 1.5 + 0.5,
                speed: Math.random() * 0.04 + 0.02
            });
        }
    }

    // --- 3. Animation Loop ---
    function animate() {
        ctx.fillStyle = 'rgba(10, 11, 18, 0.2)'; // Creates trailing effect
        ctx.fillRect(0, 0, width, height);

        // Auto-rotate the system
        rotationY += 0.003;
        rotationX += 0.001;

        const centerX = width / 2;
        const centerY = height / 2;

        particles.forEach(p => {
            // Update target shape based on global state
            if (targetShape === 'heart') {
                p.targetX = p.heart.x; p.targetY = p.heart.y; p.targetZ = p.heart.z;
            } else {
                p.targetX = p.sphere.x; p.targetY = p.sphere.y; p.targetZ = p.sphere.z;
            }

            // Smoothly interpolate position (The Morph)
            p.x += (p.targetX - p.x) * p.speed;
            p.y += (p.targetY - p.y) * p.speed;
            p.z += (p.targetZ - p.z) * p.speed;

            // Smoothly interpolate color per particle
            p.color.r += (currentGlobalColor.r - p.color.r) * 0.05;
            p.color.g += (currentGlobalColor.g - p.color.g) * 0.05;
            p.color.b += (currentGlobalColor.b - p.color.b) * 0.05;

            // Apply 3D Rotations
            let cosX = Math.cos(rotationX), sinX = Math.sin(rotationX);
            let cosY = Math.cos(rotationY), sinY = Math.sin(rotationY);

            // Rotate Y
            let x1 = p.x * cosY - p.z * sinY;
            let z1 = p.z * cosY + p.x * sinY;
            // Rotate X
            let y1 = p.y * cosX - z1 * sinX;
            let z2 = z1 * cosX + p.y * sinX;

            // Project 3D to 2D
            const perspective = 600 / (600 + z2);
            const drawX = centerX + x1 * perspective;
            const drawY = centerY + y1 * perspective;
            const drawSize = Math.max(0.1, p.size * perspective);

            // Add slight heartbeat pulse if in heart mode
            let currentSize = drawSize;
            if (targetShape === 'heart') {
                const pulse = Math.sin(Date.now() * 0.005) * 0.5 + 1;
                currentSize *= pulse;
            }

            // Draw Particle
            ctx.beginPath();
            ctx.arc(drawX, drawY, currentSize, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${Math.floor(p.color.r)}, ${Math.floor(p.color.g)}, ${Math.floor(p.color.b)})`;
            ctx.fill();
        });

        requestAnimationFrame(animate);
    }

    // --- 4. Text & Interaction Logic ---
    const poemText = document.getElementById('poem-text');
    const poemCard = document.getElementById('poem-card');

    function updateStanza() {
        if (isTransitioning) return;
        isTransitioning = true;

        // Fade out
        poemCard.classList.add('hidden');

        setTimeout(() => {
            // Update text
            poemText.innerText = stanzas[currentIndex];
            
            // Update particle color palette
            currentGlobalColor = colorPalettes[currentIndex % colorPalettes.length];

            // Morph shape if halfway through the poem
            if (currentIndex >= Math.floor(stanzas.length / 2)) {
                targetShape = 'heart';
            } else {
                targetShape = 'sphere';
            }

            // Fade in
            poemCard.classList.remove('hidden');
            isTransitioning = false;
        }, 800); // Wait for CSS fade out to finish
    }

    function advance() {
        if (currentIndex < stanzas.length - 1) {
            currentIndex++;
            updateStanza();
        }
    }

    // Initialize first stanza
    poemText.innerText = stanzas[0];
    initParticles();
    animate();

    // Event Listeners (Click & Swipe)
    document.addEventListener('click', advance);

    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    });

    document.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;
        
        // Calculate distance swiped
        let deltaX = touchEndX - touchStartX;
        let deltaY = touchEndY - touchStartY;
        
        // If swiped significantly (horizontally or vertically), advance
        if (Math.abs(deltaX) > 40 || Math.abs(deltaY) > 40) {
            advance();
        }
    });

</script>
</body>
</html>
